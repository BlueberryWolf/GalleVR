app-id: com.blueberrywolf.gallevr
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: gallevr
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.ayatana.IndicatorManager
  - --talk-name=org.freedesktop.portal.Desktop
  - --env=LD_LIBRARY_PATH=/app/lib

modules:
  - name: gallevr
    buildsystem: simple
    build-commands:
      - install -D GalleVR /app/bin/gallevr
      - mkdir -p /app/lib
      - cp -r lib/* /app/lib/
      - cp -r data /app/bin/
      - install -Dm644 gallevr.desktop /app/share/applications/com.blueberrywolf.gallevr.desktop
      - install -Dm644 com.blueberrywolf.gallevr.png /app/share/icons/hicolor/128x128/apps/com.blueberrywolf.gallevr.png
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
      - type: file
        path: gallevr.desktop
      - type: file
        path: ../../assets/images/app_icon_flatpak.png
        dest-filename: com.blueberrywolf.gallevr.png
